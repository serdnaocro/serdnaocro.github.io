<body class="bg-surface text-ink font-sans antialiased">

    <div class="max-w-5xl mx-auto px-6 py-14 sm:py-16">

      <div class="grid sm:grid-cols-2 gap-8">
        <figure>
          <div class="aspect-video w-full overflow-hidden rounded-lg bg-ink/5 ring-1 ring-ink/10">

          <figcaption class="mt-3 text-sm text-accent font-500">Reflections</figcaption>
        </figure>
        <figure>
          <div class="aspect-video w-full overflow-hidden rounded-lg bg-ink/5 ring-1 ring-ink/10">

        <figure>
          <div class="aspect-video w-full overflow-hidden rounded-lg bg-ink/5 ring-1 ring-ink/10">
            <iframe class="w-full h-full" src="https://www.youtube-nocookie.com/embed/w2oEUPQVsxw" loading="lazy" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen title="The Way You Look Tonight"></iframe>
          </div>
          <figcaption class="mt-3 text-sm text-accent font-500">The Way You Look Tonight</figcaption>
        </figure>
      </div>

      <div class="grid sm:grid-cols-2 gap-8">
        <figure>
          <div class="aspect-video w-full overflow-hidden rounded-lg bg-ink/5 ring-1 ring-ink/10">

          </div>
          <figcaption class="mt-3 text-sm text-accent font-500">First Song</figcaption>

        <figure>

      <a href="contact.html" class="hover:text-paper transition-colors">Get in touch →</a>

  <script>document.querySelectorAll('.year').forEach(e=>e.textContent=new Date().getFullYear());var _mb=document.getElementById('menuBtn'),_mm=document.getElementById('mobileMenu');if(_mb)_mb.addEventListener('click',function(){var h=_mm.classList.toggle('hidden');_mb.setAttribute('aria-expanded',String(!h));});</script>
