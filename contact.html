<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Andres Orco</title>
  <meta name="description" content="Get in touch with Andres Orco — performance, collaboration, and research." />
  <meta property="og:title" content="Contact — Andres Orco" />
  <meta property="og:type" content="website" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { display: ['Fraunces','serif'], sans: ['Inter','system-ui','sans-serif'] },
      colors: { ink:'#1a1a1a', paper:'#f6f1e6', accent:'#7c2d12' },
    } } };
  </script>
  <style>
    .navlink { position: relative; }
    .navlink::after { content:''; position:absolute; left:0; bottom:-2px; height:1px; width:0; background:currentColor; transition:width .25s ease; }
    .navlink:hover::after, .navlink.active::after { width:100%; }
  </style>
</head>
<body class="bg-paper text-ink font-sans antialiased min-h-screen flex flex-col">

  <header class="sticky top-0 z-50 bg-paper/90 backdrop-blur border-b border-ink/10">
    <nav class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="font-display text-lg font-600 tracking-tight">Andres Orco</a>
      <div class="hidden sm:flex items-center gap-7 text-sm">
        <a href="index.html" class="navlink">Home</a>
        <a href="music.html" class="navlink">Music</a>
        <a href="research.html" class="navlink">Research</a>
        <a href="cv.pdf" class="navlink">CV</a>
        <a href="contact.html" class="navlink active">Contact</a>
      </div>
    </nav>
  </header>

  <section class="flex-1 flex items-center">
    <div class="max-w-5xl mx-auto px-6 py-24 text-center w-full">
      <h1 class="font-display text-4xl sm:text-5xl font-500 mb-4">Get in touch</h1>
      <p class="text-ink/65 mb-8 max-w-xl mx-auto">Open to performance, collaboration, and research conversations.</p>
      <!-- A visible email beats a form (forms fail silently). Default = personal Gmail (permanent). -->
      <a href="mailto:andres.orco@gmail.com" class="inline-block px-7 py-3 rounded-full bg-ink text-paper text-sm font-500 hover:bg-accent transition-colors">andres.orco@gmail.com</a>
      <div class="mt-10 flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm">
        <a href="[INSTAGRAM_URL]" class="text-accent hover:underline">Instagram</a>
        <a href="[YOUTUBE_CHANNEL_URL]" class="text-accent hover:underline">YouTube</a>
        <a href="https://yalemusic.yale.edu/people/andres-orco-zerpa" class="text-accent hover:underline" target="_blank" rel="noopener">Yale Department of Music</a>
      </div>
    </div>
  </section>

  <footer class="bg-ink text-paper/50 text-sm">
    <div class="max-w-5xl mx-auto px-6 py-8 flex flex-wrap items-center justify-between gap-3">
      <span>© <span class="year"></span> Andres Orco</span>
      <a href="index.html" class="hover:text-paper transition-colors">Home</a>
    </div>
  </footer>
  <script>document.querySelectorAll('.year').forEach(e=>e.textContent=new Date().getFullYear());</script>
</body>
</html>
